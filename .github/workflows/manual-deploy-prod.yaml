name: Manual deploy to prod
on:
  workflow_dispatch:
    inputs:
      skip-tests:
        description: 'Skip tests?'
        default: false
        type: boolean
      skip-validation:
        description: 'Skip validation? (eslint, prettier, typecheck)'
        default: false
        type: boolean

jobs:
  build:
    name: Build
    permissions:
      contents: read
      id-token: write
    uses: navikt/familie-baks-gha-workflows/.github/workflows/build-yarn-app.yaml@main # ratchet:exclude
    with:
      build-image: true
      push-image: true
      skip-tests: ${{ inputs.skip-tests }}
      skip-validation: ${{ inputs.skip-validation }}
      build-profile: 'prod'
    secrets: inherit
  deploy-with-new-image:
    name: Deploy with new image
    permissions:
      contents: read
      id-token: write
    needs: [build]
    uses: navikt/familie-baks-gha-workflows/.github/workflows/deploy.yaml@main # ratchet:exclude
    with:
      image: ${{ needs.build.outputs.image }}
      cluster: prod-gcp
      resource: .nais/app-prod.yaml
    secrets: inherit
  notify-audit:
    name: Notify if audited deploy
    if: github.ref != 'refs/heads/main'
    permissions: {}
    needs: deploy-with-new-image
    uses: navikt/familie-baks-gha-workflows/.github/workflows/notify-audited-deploy.yaml@main # ratchet:exclude
    secrets:
      BAKS_AUDIT_ALERTS_SLACK_WEBHOOK: ${{ secrets.BAKS_AUDIT_ALERTS_SLACK_WEBHOOK }}
